name: Sync Preview Branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-preview-${{ github.repository }}
  cancel-in-progress: true

jobs:
  sync-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force preview to match main
        run: |
          git push origin origin/main:refs/heads/preview --force
